name: build

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        shell: bash
        run: python3 -m pip install --break-system-packages --quiet pyyaml

      - name: Parse tag and manifest
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^([a-z0-9-]+)-v(.+)$ ]]; then
            echo "::error::Tag '$TAG' does not match '<binary>-v<version>'"
            exit 1
          fi
          BINARY="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          MANIFEST="manifests/${BINARY}.yaml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::No manifest at $MANIFEST"
            exit 1
          fi

          # Extract values via python yaml (always present on macos runners)
          eval "$(python3 - "$MANIFEST" <<'PY'
          import sys, yaml
          m = yaml.safe_load(open(sys.argv[1]))
          b = m.get('build', {})
          print(f"MANIFEST_VERSION='{m['version']}'")
          print(f"GO_VERSION='{b.get('go_version', '1.26')}'")
          print(f"MODULE='{m['upstream']['module']}'")
          print(f"REPO='{m['upstream']['repository']}'")
          print(f"LICENSE_URL='{m['upstream']['license']}'")
          print(f"CGO_ENABLED='{1 if b.get('cgo_enabled', False) else 0}'")
          print(f"BUILD_FLAGS='{b.get('flags', '-trimpath -buildvcs=false')}'")
          print(f"ARCHS='{' '.join(m['architectures'])}'")
          print(f"PACKAGE_SUBDIR='{b.get('package_subdir', '')}'")
          print(f"BUILD_METHOD='{b.get('build_method', 'install')}'")
          ub = b.get('upstream_binary') or {}
          print(f"UPSTREAM_URL_TEMPLATE='{ub.get('url_template', '')}'")
          print(f"UPSTREAM_ARCHIVE_FORMAT='{ub.get('archive_format', '')}'")
          print(f"UPSTREAM_EXTRACT_PATH='{ub.get('extract_path', '')}'")
          PY
          )"

          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version '$VERSION' does not match manifest version '$MANIFEST_VERSION'"
            exit 1
          fi

          {
            echo "binary=$BINARY"
            echo "version=$VERSION"
            echo "go_version=$GO_VERSION"
            echo "module=$MODULE"
            echo "repo=$REPO"
            echo "license_url=$LICENSE_URL"
            echo "cgo_enabled=$CGO_ENABLED"
            echo "build_flags=$BUILD_FLAGS"
            echo "archs=$ARCHS"
            echo "package_subdir=$PACKAGE_SUBDIR"
            echo "build_method=$BUILD_METHOD"
            echo "upstream_url_template=$UPSTREAM_URL_TEMPLATE"
            echo "upstream_archive_format=$UPSTREAM_ARCHIVE_FORMAT"
            echo "upstream_extract_path=$UPSTREAM_EXTRACT_PATH"
          } >> "$GITHUB_OUTPUT"

          echo "==> Building $BINARY v$VERSION for archs: $ARCHS"

      - uses: actions/setup-go@v5
        if: steps.meta.outputs.build_method != 'upstream-binary'
        with:
          go-version: ${{ steps.meta.outputs.go_version }}
          cache: false

      - name: Build all architectures
        shell: bash
        env:
          BINARY: ${{ steps.meta.outputs.binary }}
          VERSION: ${{ steps.meta.outputs.version }}
          MODULE: ${{ steps.meta.outputs.module }}
          REPO: ${{ steps.meta.outputs.repo }}
          CGO_ENABLED: ${{ steps.meta.outputs.cgo_enabled }}
          BUILD_FLAGS: ${{ steps.meta.outputs.build_flags }}
          ARCHS: ${{ steps.meta.outputs.archs }}
          PACKAGE_SUBDIR: ${{ steps.meta.outputs.package_subdir }}
          BUILD_METHOD: ${{ steps.meta.outputs.build_method }}
          UPSTREAM_URL_TEMPLATE: ${{ steps.meta.outputs.upstream_url_template }}
          UPSTREAM_ARCHIVE_FORMAT: ${{ steps.meta.outputs.upstream_archive_format }}
          UPSTREAM_EXTRACT_PATH: ${{ steps.meta.outputs.upstream_extract_path }}
        run: |
          set -euo pipefail
          mkdir -p dist
          export GOFLAGS="$BUILD_FLAGS"

          for ARCH in $ARCHS; do
            export GOOS="${ARCH%-*}"
            export GOARCH="${ARCH#*-}"
            STAGE=$(mktemp -d)
            # GOBIN cannot be set for cross-compiled `go install` (Go refuses).
            # GOPATH works for both: native lands at $GOPATH/bin/<name>,
            # cross at $GOPATH/bin/$GOOS_$GOARCH/<name>.
            unset GOBIN
            export GOPATH="$STAGE"

            echo "==> $ARCH (GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=$CGO_ENABLED method=$BUILD_METHOD)"

            case "$BUILD_METHOD" in
              install)
                # Default path. `go install <module>@<version>` resolves via
                # the module proxy and lands the binary in $GOPATH/bin (with
                # an arch subdir for cross-compile).
                INSTALL_TARGET="${MODULE}@v${VERSION}"
                if [ -n "$PACKAGE_SUBDIR" ]; then
                  INSTALL_TARGET="${MODULE}/${PACKAGE_SUBDIR}@v${VERSION}"
                fi
                go install "$INSTALL_TARGET"
                ;;

              source-checkout)
                # `go install module@version` refuses to honour `replace`
                # directives in the target module's go.mod. The only way to
                # respect them is to clone the upstream repo at the version
                # tag and let its go.mod be the main module. Used by ntfy
                # (replace github.com/emersion/go-smtp => v0.17.0 for #839).
                # Provenance shifts from module-proxy@version to repo@tag —
                # both still pin a single immutable upstream artifact.
                SRC_DIR="$STAGE/src"
                git clone --depth 1 --branch "v${VERSION}" "https://github.com/${REPO}.git" "$SRC_DIR"
                BUILD_DIR="$SRC_DIR"
                if [ -n "$PACKAGE_SUBDIR" ]; then
                  BUILD_DIR="$SRC_DIR/$PACKAGE_SUBDIR"
                fi
                mkdir -p "$STAGE/bin"
                BUILD_OUT="$STAGE/bin/${BINARY}"
                ( cd "$BUILD_DIR" && go build -o "$BUILD_OUT" . )
                ;;

              upstream-binary)
                # Mirror upstream's prebuilt release artifact instead of
                # rebuilding from source. Use this when upstream still ships
                # working darwin binaries (ntfy) and rebuilding is just
                # recreating what they already publish, often with heavy
                # toolchain dependencies (mkdocs, npm, etc. for go:embed
                # assets). Trust posture is unchanged: TLS to GH Releases +
                # SHA256 pin compiled into the signed harness `.app`.
                if [ -z "$UPSTREAM_URL_TEMPLATE" ] || [ -z "$UPSTREAM_ARCHIVE_FORMAT" ] || [ -z "$UPSTREAM_EXTRACT_PATH" ]; then
                  echo "::error::build_method=upstream-binary requires upstream_binary.{url_template,archive_format,extract_path}"
                  exit 1
                fi
                URL=$(echo "$UPSTREAM_URL_TEMPLATE" | sed -e "s|{repo}|$REPO|g" -e "s|{version}|$VERSION|g")
                EXTRACT=$(echo "$UPSTREAM_EXTRACT_PATH" | sed -e "s|{repo}|$REPO|g" -e "s|{version}|$VERSION|g")
                ARCHIVE="$STAGE/upstream.archive"
                echo "==> downloading $URL"
                curl -fL --retry 3 -o "$ARCHIVE" "$URL"
                case "$UPSTREAM_ARCHIVE_FORMAT" in
                  tar.gz|tgz) tar -xzf "$ARCHIVE" -C "$STAGE" ;;
                  tar.bz2)    tar -xjf "$ARCHIVE" -C "$STAGE" ;;
                  zip)        unzip -q "$ARCHIVE" -d "$STAGE" ;;
                  *)
                    echo "::error::unknown archive format '$UPSTREAM_ARCHIVE_FORMAT' (expected tar.gz, tar.bz2, or zip)"
                    exit 1
                    ;;
                esac
                EXTRACTED="$STAGE/$EXTRACT"
                if [ ! -f "$EXTRACTED" ]; then
                  echo "::error::expected binary at $EXTRACTED not found in archive — checking $STAGE contents:"
                  find "$STAGE" -type f -not -path "*/upstream.archive" | head -30
                  exit 1
                fi
                mkdir -p "$STAGE/bin"
                cp "$EXTRACTED" "$STAGE/bin/${BINARY}"
                chmod +x "$STAGE/bin/${BINARY}"
                ;;

              *)
                echo "::error::Unknown build_method '$BUILD_METHOD' (expected 'install', 'source-checkout', or 'upstream-binary')"
                exit 1
                ;;
            esac

            if [ -f "$STAGE/bin/${GOOS}_${GOARCH}/${BINARY}" ]; then
              SRC="$STAGE/bin/${GOOS}_${GOARCH}/${BINARY}"
            elif [ -f "$STAGE/bin/${BINARY}" ]; then
              SRC="$STAGE/bin/${BINARY}"
            else
              echo "::error::Binary not found in $STAGE/bin after build"
              find "$STAGE" -type f
              exit 1
            fi

            DEST="dist/${BINARY}-${VERSION}-${ARCH}"
            mv "$SRC" "$DEST"
            shasum -a 256 "$DEST" | awk '{print $1}' > "${DEST}.sha256"
            SIZE=$(wc -c < "$DEST" | tr -d ' ')
            echo "==> wrote $DEST ($SIZE bytes, sha256 $(cat ${DEST}.sha256))"
          done

          ls -la dist/

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          BINARY: ${{ steps.meta.outputs.binary }}
          VERSION: ${{ steps.meta.outputs.version }}
          MODULE: ${{ steps.meta.outputs.module }}
          REPO: ${{ steps.meta.outputs.repo }}
          LICENSE_URL: ${{ steps.meta.outputs.license_url }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<EOF
          Mirrored build of [\`${BINARY}\`](https://github.com/${REPO}) v${VERSION}.

          ## Provenance

          - Source module: \`${MODULE}@v${VERSION}\`
          - Build host: hosted GitHub Actions \`macos-14\` runner
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Manifest: [\`manifests/${BINARY}.yaml\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/manifests/${BINARY}.yaml)
          - Build flags: \`-trimpath -buildvcs=false\`, \`CGO_ENABLED=0\` (per manifest)

          ## Trust model

          These assets are **not** codesigned. The Stallari daemon trusts them via:
          1. TLS to GitHub Releases for download
          2. SHA256 match against a pin compiled into the signed harness \`.app\`
          3. \`com.apple.quarantine\` xattr stripped after SHA verify

          Apple Developer ID secrets do not belong in CI; the trust root is the harness, not these binaries.

          ## Verifying

          \`\`\`
          shasum -a 256 -c ${BINARY}-${VERSION}-darwin-arm64.sha256
          \`\`\`

          ## Upstream license

          ${LICENSE_URL}
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "==> Release $TAG already exists; updating notes and uploading assets"
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
          fi
          gh release upload "$TAG" dist/* --clobber
