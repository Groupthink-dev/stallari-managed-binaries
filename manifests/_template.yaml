# Manifest template for a managed binary.
#
# Copy to manifests/<binary>.yaml and fill in. The CI workflow keys off the
# filename for the binary id (e.g. manifests/gatus.yaml → binary id "gatus").
# Push tag "<binary>-v<version>" to trigger a build; the tag's version must
# match this file's `version:` field exactly.

binary: example                          # Stable id; matches filename and tag prefix
version: "0.0.0"                         # Build-artifact version (matches the tag's -v suffix).
                                         # Usually equals upstream_version. Suffix
                                         # (e.g. "0.0.0-server.1") when this build
                                         # diverges from upstream's binary while
                                         # pointing at the same upstream tag.
# upstream_version: "0.0.0"              # Optional. Upstream tag to clone/install
                                         # for `source-checkout` / `install`. Defaults
                                         # to `version`. Set when `version` carries a
                                         # Stallari-side suffix.

upstream:
  repository: org/repo                   # GitHub repo, for release-notes link
  module: github.com/org/repo            # Go module path passed to `go install`
  license: https://github.com/org/repo/blob/master/LICENSE
  homepage: https://example.com          # Optional

purpose: |                               # One paragraph; appears in release notes
  Short statement of what this binary does and which Stallari subsystem
  consumes it. Cite the relevant DD.

build:
  go_version: "1.26"                     # Pinned for reproducibility; bump when upstream go.mod requires
  cgo_enabled: false                     # true only if upstream needs CGO (e.g. SQLite-with-libsqlite)
  flags: "-trimpath -buildvcs=false"     # Standard reproducibility flags; do not change without justification
  # pre_build: |                          # Optional shell snippet (multi-line OK).
  #   echo "runs inside source-checkout"  # Runs inside the git checkout, before
  #                                       # `go build`. source-checkout only.
  #                                       # Used by ntfy to stub //go:embed
  #                                       # targets without upstream's npm + mkdocs.
  build_method: install                  # 'install' (default) → go install module@version
                                         # 'source-checkout'   → git clone repo@tag + go build .
                                         # 'upstream-binary'   → download upstream's prebuilt
                                         #                       release artifact, extract, repack.
                                         # Use source-checkout when upstream go.mod has 'replace'
                                         # directives — `go install` refuses them.
                                         # Use upstream-binary when upstream still ships working
                                         # binaries that we'd otherwise be rebuilding only to
                                         # recreate what they already publish (heavy toolchain,
                                         # go:embed assets requiring mkdocs/npm, etc.). Trust
                                         # posture is unchanged: SHA pin in signed harness `.app`
                                         # is the integrity guarantee, not the build path.

# Required when build_method is 'upstream-binary'. Templates may use {repo} and
# {version} substitutions; both are taken from the manifest's upstream block
# and version field.
# upstream_binary:
#   url_template: "https://github.com/{repo}/releases/download/v{version}/foo_{version}_darwin_all.tar.gz"
#   archive_format: tar.gz                # tar.gz, tar.bz2, or zip
#   extract_path: "foo_{version}_darwin_all/foo"   # path inside archive to the binary

architectures:                           # Stallari runs on Apple Silicon only — do not add darwin-amd64.
  - darwin-arm64                         # Add linux-arm64 / linux-amd64 when a daemon port requires them.

# Optional: subdirectory inside the upstream module containing the main package.
# Default is the module root (`go install module@version`).
# package_subdir: cmd/binname
